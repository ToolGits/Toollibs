<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>System Status</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-card" style="text-align:center;">

  <h1 id="title">Loading...</h1>

  <p id="desc" style="margin-top:10px; color:#8b949e;"></p>

  <button class="button" onclick="goHome()" style="margin-top:20px;">
    Return Home
  </button>

</div>

<script>

async function loadStatus() {

  const res = await fetch("maintenance.json");
  const data = await res.json();

  const mode = data.active;

  const title = document.getElementById("title");
  const desc = document.getElementById("desc");

  if (mode === "maintenance") {

    title.textContent = "🔴 Maintenance Mode";
    desc.textContent = data.maintenance.reason;

  }

  else if (mode === "degraded") {

    title.textContent = "🟡 Degraded Mode";
    desc.textContent = "System is partially unstable.";

  }

  else {

    window.location.href = "index.html";
  }
}

function goHome() {
  window.location.href = "index.html";
}

loadStatus();

</script>

</body>
</html>
