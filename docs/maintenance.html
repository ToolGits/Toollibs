<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Service Unavailable</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      line-height: 1.6;
    }

    .code {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 15px;
      background: #1f1f1f;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    .spinner {
      margin: 30px auto;
      width: 40px;
      height: 40px;
      border: 4px solid #333;
      border-top: 4px solid #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .small {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>Service Unavailable</h1>

    <div class="spinner"></div>

    <p>
      The Toollibs service is temporarily unavailable.
      Please try again later.
    </p>

    <div class="code" id="errorCode">
      Error 503
    </div>

    <div class="small">
      Toollibs system status page
    </div>

  </div>

  <script>
    function getCodeFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("code") || "503";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const code = getCodeFromURL();
      document.getElementById("errorCode").textContent = "Error " + code;
    });
  </script>

</body>
</html>
